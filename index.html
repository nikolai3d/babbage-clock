<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Babbage Clock</title>
    <meta
      name="description"
      content="A web-based 3D countdown clock built from spinning gear mechanisms."
    />
    <meta name="theme-color" content="#17110d" />
    <!--
      Inline so there is no second request and no binary asset to keep in sync.
      Without it every page load fetches /favicon.ico and logs a 404, which the
      e2e "no console errors" assertion would otherwise have to ignore — and an
      ignored 404 is one that hides the next real missing asset.
    -->
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%23151013'/%3E%3Ccircle cx='16' cy='16' r='11' fill='none' stroke='%23b87333' stroke-width='3'/%3E%3Ccircle cx='16' cy='16' r='3.5' fill='%23c98a4b'/%3E%3C/svg%3E"
    />
  </head>
  <body>
    <!--
      `role="img"` plus a name, rather than an unlabelled canvas: assistive
      technology describes the view instead of announcing an empty graphic, and
      it does not try to walk inside it. The remaining time is not carried here
      — `ui/countdownAnnouncer.ts` mirrors it into a live region as text.

      `tabindex="0"` makes orbiting reachable without a pointer (arrow keys,
      +/-, Home to reset — see `render/renderer.ts`). It is one tab stop and
      nothing traps focus: Tab always moves on to the settings button.
    -->
    <canvas
      id="scene-canvas"
      tabindex="0"
      role="img"
      aria-label="Three-dimensional view of the clock mechanism"
      aria-describedby="canvas-help"
    ></canvas>
    <p id="canvas-help" class="sr-only">
      Use the arrow keys to orbit the mechanism, plus and minus to zoom, and Home to reset the view.
      The remaining time is announced separately, so you do not need this view to read the clock.
    </p>
    <div id="ui-root"></div>

    <!--
      The loading state is authored here rather than created in JavaScript, so it
      is on screen from the first paint — before the module graph, three.js or
      any texture has loaded. `ui/loadingScreen.ts` adopts this element, drives
      the bar from real loader progress and removes it when boot completes.
    -->
    <div id="loading-screen" class="loader" role="status" aria-live="polite">
      <div class="loader__inner">
        <svg class="loader__gears" viewBox="-6 -6 132 108" aria-hidden="true" focusable="false">
          <g class="loader__gear loader__gear--large" transform="translate(46 50)">
            <circle class="loader__gear-teeth" r="30" />
            <circle class="loader__gear-rim" r="21" />
            <g class="loader__gear-spokes">
              <line x1="0" y1="-20" x2="0" y2="20" />
              <line x1="-20" y1="0" x2="20" y2="0" />
              <line x1="-14" y1="-14" x2="14" y2="14" />
              <line x1="-14" y1="14" x2="14" y2="-14" />
            </g>
            <circle class="loader__gear-hub" r="6" />
          </g>
          <g class="loader__gear loader__gear--small" transform="translate(92 28)">
            <circle class="loader__gear-teeth" r="18" />
            <circle class="loader__gear-rim" r="12" />
            <circle class="loader__gear-hub" r="4" />
          </g>
        </svg>
        <p class="loader__title">Babbage Clock</p>
        <p class="loader__caption">Winding the mainspring</p>
        <div class="loader__bar">
          <div class="loader__bar-fill"></div>
        </div>
        <p class="loader__percent">0%</p>
      </div>
    </div>

    <noscript>
      <p class="noscript">Babbage Clock needs JavaScript and a WebGL2-capable browser.</p>
    </noscript>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
